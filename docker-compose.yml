name: scale-av-cutter
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: scale
      POSTGRES_PASSWORD: scale
      POSTGRES_DB: scale_av_cutter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scale"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
