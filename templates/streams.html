<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SCALE AV Cutter - Live Streams</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
  <link rel="icon" href="data:,">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark">
    <a class="btn btn-sm btn-outline-light mr-2" href="/">Home</a>
    <span class="navbar-brand mb-0">Live Streams</span>
  </nav>

  <div class="container mt-3">
    {% if streams %}
    <table class="table table-sm table-hover bg-white">
      <thead>
        <tr>
          <th>Title</th>
          <th>Video ID</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for stream in streams %}
        <tr>
          <td>{{ stream.title|e }}</td>
          <td><code>{{ stream.video_id|e }}</code></td>
          <td>
            {% if room_days %}
            <button class="btn btn-sm btn-primary assign-btn"
                    data-video-id="{{ stream.video_id|e }}"
                    data-title="{{ stream.title|e }}"
                    data-toggle="modal"
                    data-target="#assign-modal">
              Assign to Room
            </button>
            {% endif %}
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <p class="text-muted">No live streams found for this channel.</p>
    {% endif %}
  </div>

  <!-- Assign modal -->
  <div class="modal fade" id="assign-modal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Assign to Room</h5>
          <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
        </div>
        <div class="modal-body">
          <p class="mb-1">Stream: <strong id="modal-stream-title"></strong></p>
          <p class="mb-3">Video ID: <code id="modal-video-id"></code></p>
          <div class="form-group">
            <label for="room-day-select">Room Day</label>
            <select class="form-control" id="room-day-select">
              {% for room_day in room_days %}
              <option value="{{ room_day.id }}">{{ room_day.day }}, {{ room_day.room }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="assign-confirm">Assign</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
  <script>
    let currentVideoId = null;

    document.querySelectorAll('.assign-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        currentVideoId = btn.dataset.videoId;
        document.getElementById('modal-stream-title').textContent = btn.dataset.title;
        document.getElementById('modal-video-id').textContent = currentVideoId;
      });
    });

    document.getElementById('assign-confirm').addEventListener('click', () => {
      const roomDayId = document.getElementById('room-day-select').value;
      const formData = new FormData();
      formData.append('id', roomDayId);
      formData.append('vid', currentVideoId);
      fetch('/vid', {
        method: 'POST',
        body: formData,
        credentials: 'same-origin',
      })
        .then((r) => r.json())
        .then((data) => {
          if (data.error) {
            window.alert('ERROR: ' + data.error);
          } else {
            window.location.reload();
          }
        });
    });
  </script>
</body>
</html>
